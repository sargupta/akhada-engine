name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install poetry==2.3.4
      - run: poetry install --no-interaction
      - run: poetry run ruff check .
      - run: poetry run mypy --strict src
      - run: poetry run pytest -q

  studio:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/studio-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
